services:
  backend:
    container_name: "can-bridge"
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: daq-backend:latest
    ports:
      - "8080:8080"
    network_mode: "host"

  gui:
    container_name: "gui"
    build:
      context: ./gui
      dockerfile: Dockerfile
    image: daq-gui:latest
    ports:
      - "8080:80"